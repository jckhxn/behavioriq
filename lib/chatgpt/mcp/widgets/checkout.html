<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purchase Credits</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
      padding: 32px;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 15px;
      color: #6b7280;
      margin-bottom: 12px;
    }

    .credit-info {
      background: #f0f4ff;
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .credit-info label {
      font-size: 13px;
      color: #667eea;
      font-weight: 600;
    }

    .credit-info value {
      font-size: 18px;
      font-weight: 700;
      color: #667eea;
    }

    .plans {
      margin-top: 24px;
      display: grid;
      gap: 12px;
    }

    .plan {
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }

    .plan:hover {
      border-color: #667eea;
      background: #f3f4f6;
    }

    .plan.selected {
      border-color: #667eea;
      background: #eef2ff;
    }

    .plan input[type="radio"] {
      position: absolute;
      opacity: 0;
      cursor: pointer;
    }

    .plan-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .plan-title {
      font-weight: 600;
      color: #1f2937;
      font-size: 15px;
    }

    .plan-price {
      font-size: 18px;
      font-weight: 700;
      color: #667eea;
    }

    .plan-details {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.5;
    }

    .badge {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      margin-top: 8px;
      margin-right: 4px;
    }

    .stripe-element {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      margin-top: 20px;
      min-height: 40px;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-cancel {
      background: #f3f4f6;
      color: #374151;
      flex: 0;
    }

    .btn-cancel:hover {
      background: #e5e7eb;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      flex: 1;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .security-note {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e5e7eb;
    }

    .security-note a {
      color: #667eea;
      text-decoration: none;
    }

    .security-note a:hover {
      text-decoration: underline;
    }

    .loading {
      display: inline-block;
      width: 4px;
      height: 4px;
      background: currentColor;
      border-radius: 50%;
      animation: loading 1.4s infinite;
    }

    .loading:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes loading {
      0%,
      100% {
        opacity: 0.3;
      }
      50% {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Purchase Credits</h1>
      <p id="headerText">You need 1 credit to start a full assessment</p>

      <div class="credit-info">
        <label>Current Credits:</label>
        <value id="currentCredits">0</value>
      </div>
    </div>

    <form id="checkoutForm">
      <div class="plans" id="plansContainer"></div>

      <div class="stripe-element" id="card-element"></div>

      <div class="actions">
        <button type="button" class="btn-cancel" id="cancelBtn">Cancel</button>
        <button type="submit" class="btn-primary" id="submitBtn">Complete Purchase</button>
      </div>
    </form>

    <div class="security-note">
      🔒 Secure payment powered by Stripe. Your card information is encrypted and never stored.
    </div>
  </div>

  <script src="https://js.stripe.com/v3/"></script>
  <script>
    let stripe, elements, cardElement;
    let selectedPlanId = null;
    let sessionData = {};

    // Initialize with widget data
    window.addEventListener("message", (event) => {
      if (event.data.type === "widgetState") {
        sessionData = event.data.state;
        initCheckout();
      }
    });

    // Get data from widget state
    if (window.openai && window.openai.widgetState) {
      sessionData = window.openai.widgetState;
      initCheckout();
    }

    function initCheckout() {
      // Initialize Stripe
      const stripeKey = document.currentScript.getAttribute("data-stripe-key");
      if (!stripeKey) {
        console.error("Stripe key not found");
        return;
      }

      stripe = Stripe(stripeKey);
      elements = stripe.elements();
      cardElement = elements.create("card");
      cardElement.mount("#card-element");

      // Populate plans
      renderPlans();

      // Update header
      document.getElementById("currentCredits").textContent = sessionData.creditsNeeded
        ? `${sessionData.creditsNeeded} needed`
        : "0";
    }

    function renderPlans() {
      const plansContainer = document.getElementById("plansContainer");
      const plans = [
        {
          id: "single",
          title: "Single Assessment",
          credits: "1 credit",
          price: "$9.97",
          description: "Perfect for trying it out",
        },
        {
          id: "monthly_core",
          title: "Core Plan",
          credits: "2 credits/month",
          price: "$5.99",
          period: "Monthly",
          description: "Billed monthly, cancel anytime",
          recommended: false,
        },
        {
          id: "monthly_family",
          title: "Family Plan",
          credits: "5 credits/month",
          price: "$9.99",
          period: "Monthly",
          description: "Best for families. Includes unlimited AI sessions.",
          recommended: true,
        },
      ];

      plansContainer.innerHTML = "";

      plans.forEach((plan) => {
        const div = document.createElement("div");
        div.className = "plan";
        if (plan.recommended) {
          div.classList.add("selected");
          selectedPlanId = plan.id;
        }

        div.innerHTML = `
          <input type="radio" name="plan" value="${plan.id}" ${plan.recommended ? "checked" : ""} />
          <div class="plan-header">
            <div>
              <div class="plan-title">${plan.title}</div>
              <div class="plan-details">${plan.description}</div>
              ${plan.recommended ? '<span class="badge">Most Popular</span>' : ""}
            </div>
            <div>
              <div class="plan-price">${plan.price}</div>
              ${plan.period ? `<div style="font-size: 12px; color: #6b7280; text-align: right;">${plan.period}</div>` : ""}
            </div>
          </div>
          <div style="font-size: 13px; color: #667eea; font-weight: 600; margin-top: 8px;">
            ${plan.credits}
          </div>
        `;

        div.onclick = () => {
          document.querySelectorAll(".plan").forEach((p) => p.classList.remove("selected"));
          div.classList.add("selected");
          div.querySelector("input").checked = true;
          selectedPlanId = plan.id;
        };

        plansContainer.appendChild(div);
      });
    }

    document.getElementById("checkoutForm").onsubmit = async (e) => {
      e.preventDefault();

      if (!selectedPlanId) {
        alert("Please select a plan");
        return;
      }

      const submitBtn = document.getElementById("submitBtn");
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loading"></span><span class="loading"></span><span class="loading"></span>';

      try {
        // Create payment method
        const { paymentMethod, error } = await stripe.createPaymentMethod({
          type: "card",
          card: cardElement,
        });

        if (error) {
          throw new Error(error.message);
        }

        // Send to backend
        const response = await fetch("/api/stripe/checkout", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            planId: selectedPlanId,
            paymentMethodId: paymentMethod.id,
            sessionId: sessionData.sessionId,
          }),
        });

        const data = await response.json();

        if (data.url) {
          window.location.href = data.url;
        } else if (data.clientSecret) {
          // Handle 3D Secure or other authentication
          const result = await stripe.confirmCardPayment(data.clientSecret, {
            payment_method: paymentMethod.id,
          });

          if (result.paymentIntent && result.paymentIntent.status === "succeeded") {
            notifySuccess();
          } else {
            throw new Error("Payment failed");
          }
        } else {
          throw new Error(data.error || "Payment processing failed");
        }
      } catch (error) {
        alert(`Error: ${error.message}`);
        submitBtn.disabled = false;
        submitBtn.innerHTML = "Complete Purchase";
      }
    };

    document.getElementById("cancelBtn").onclick = (e) => {
      e.preventDefault();
      if (window.openai && window.openai.sendFollowUpMessage) {
        window.openai.sendFollowUpMessage("I changed my mind about purchasing credits.");
      }
    };

    function notifySuccess() {
      document.querySelector("form").style.display = "none";
      const container = document.querySelector(".container");
      container.innerHTML = `
        <div style="text-align: center;">
          <div style="font-size: 48px; margin-bottom: 16px;">✅</div>
          <h1 style="font-size: 24px; font-weight: 700; color: #1f2937; margin-bottom: 12px;">
            Payment Successful!
          </h1>
          <p style="font-size: 15px; color: #6b7280; margin-bottom: 20px;">
            Your credits have been added to your account. You can now start your assessment.
          </p>
        </div>
      `;

      if (window.openai && window.openai.toolOutput) {
        window.openai.toolOutput({
          content: [{ type: "text", text: "Payment successful! User has been credited." }],
          structuredContent: { paymentStatus: "success" },
        });
      }
    }
  </script>
</body>
</html>
